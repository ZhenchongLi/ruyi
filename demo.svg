<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460">
  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes type1 { 0%{width:0} 100%{width:210px} }
    @keyframes fade1 { 0%,15%{opacity:0} 20%{opacity:1} }
    @keyframes fade2 { 0%,35%{opacity:0} 40%{opacity:1} }
    @keyframes fade3 { 0%,55%{opacity:0} 60%{opacity:1} }
    @keyframes fade4 { 0%,75%{opacity:0} 80%{opacity:1} }
    .cursor { animation: blink 1s step-end infinite; }
    .line1 { animation: fade1 10s ease-in both; }
    .line2 { animation: fade2 10s ease-in both; }
    .line3 { animation: fade3 10s ease-in both; }
    .line4 { animation: fade4 10s ease-in both; }
    text { font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace; }
  </style>
  <!-- Window chrome -->
  <rect width="680" height="460" rx="10" fill="#1e1e2e"/>
  <rect width="680" height="36" rx="10" fill="#313244"/>
  <rect y="26" width="680" height="10" fill="#313244"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="340" y="22" fill="#cdd6f4" font-size="13" text-anchor="middle">ruyi -- coverage mode</text>

  <!-- Prompt -->
  <text x="20" y="65" fill="#89b4fa" font-size="14">$</text>
  <text x="35" y="65" fill="#cdd6f4" font-size="14">ruyi</text>

  <!-- Header box -->
  <g class="line1">
    <rect x="20" y="80" width="640" height="60" rx="4" fill="#181825" stroke="#45475a" stroke-width="1"/>
    <text x="34" y="100" fill="#89b4fa" font-size="13">Ruyi</text>
    <text x="68" y="100" fill="#6c7086" font-size="13">-- coverage mode | TypeScript/react | pnpm + vitest</text>
    <text x="34" y="120" fill="#6c7086" font-size="13">Branch: ruyi/coverage-session | Plan: 20 iterations</text>
  </g>

  <!-- Iteration 1 - PASS -->
  <g class="line2">
    <text x="20" y="172" fill="#f9e2af" font-size="13" font-weight="bold">=== Iteration 1/20 ===</text>
    <text x="20" y="195" fill="#6c7086" font-size="13">Task:</text>
    <text x="60" y="195" fill="#cdd6f4" font-size="13">Write tests for src/auth/session.ts</text>
    <text x="20" y="215" fill="#6c7086" font-size="13">Claude: implementing...</text>
    <text x="20" y="235" fill="#6c7086" font-size="13">Validate:</text>
    <text x="90" y="235" fill="#cdd6f4" font-size="13">pnpm test</text>
    <text x="175" y="235" fill="#a6e3a1" font-size="13">OK (14 tests, 14 passed)</text>
    <rect x="20" y="245" width="640" height="24" rx="3" fill="#a6e3a120"/>
    <text x="30" y="262" fill="#a6e3a1" font-size="13" font-weight="bold">KEEP</text>
    <text x="80" y="262" fill="#6c7086" font-size="13">commit a3f9c21 -- merged into your branch</text>
  </g>

  <!-- Iteration 2 - FAIL -->
  <g class="line3">
    <text x="20" y="302" fill="#f9e2af" font-size="13" font-weight="bold">=== Iteration 2/20 ===</text>
    <text x="20" y="325" fill="#6c7086" font-size="13">Task:</text>
    <text x="60" y="325" fill="#cdd6f4" font-size="13">Write tests for src/api/users.ts</text>
    <text x="20" y="345" fill="#6c7086" font-size="13">Claude: implementing...</text>
    <text x="20" y="365" fill="#6c7086" font-size="13">Validate:</text>
    <text x="90" y="365" fill="#cdd6f4" font-size="13">pnpm test</text>
    <text x="175" y="365" fill="#f38ba8" font-size="13">FAIL (1 assertion failed)</text>
    <rect x="20" y="375" width="640" height="24" rx="3" fill="#f38ba820"/>
    <text x="30" y="392" fill="#f38ba8" font-size="13" font-weight="bold">DISCARD</text>
    <text x="100" y="392" fill="#6c7086" font-size="13">reverted -- gone, as if it never happened</text>
  </g>

  <!-- Summary -->
  <g class="line4">
    <rect x="20" y="412" width="640" height="36" rx="4" fill="#181825" stroke="#45475a" stroke-width="1"/>
    <text x="34" y="435" fill="#a6e3a1" font-size="13">Done:</text>
    <text x="76" y="435" fill="#cdd6f4" font-size="13">11 kept, 3 discarded, 6 skipped | Branch ready for review</text>
  </g>
</svg>
